<!doctype html>
<html lang="pt-br">
  <head>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css" >
    <link href="css/style.css" rel="stylesheet" type="text/css">

    <title>Login</title>

  </head>

  <body>


      <div class="main-login"><!--Div Login-->

        <div class="left-login">
            <h1>Faca login<br>E entre para o nosso time</h1>
            <img src="espaco.svg" class="left-login-img" alt="Espaco">
        </div>


        <div class="right-login"><!--Login-->
            <div class="card-login">

                <h1>LOGIN</h1>

                <div class="textfield"><!--Usuario-->
                  <label for="usuario">Usuario</label>
                  <input type="text" name="usuario" placeholder="Usuario">
                </div><!-- F Usuario-->

                <div class="textfield"><!--senha-->
                  <label for="senha">Senha</label>
                  <input type="password" name="senha" placeholder="Senha">
                </div><!--F senha-->

                <button class="btn-login">Login</button><!--Botao Login-->

            </div>
        </div><!-- F Login-->

      </div><!--F Div Login-->






























    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="js/bootstrap.min.js" ></script>
    
  </body>
</html>
